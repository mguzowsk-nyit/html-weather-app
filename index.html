<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Mary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main>
        <!-- LEFT PANEL -->
        <section id="current-weather" class="current-weather">
            <h1>Monday</h1>
            <time datetime="2022-06-20">20 Jun 2022</time>
            <div class="location-biarritz-row">
                <img src="images/location.svg" alt="Location Icon" class="icon-biarritz">
                <span>Biarritz, FR</span>
            </div>

            <div class="left-spacer"></div>

            <img src="images/sun-white.svg" alt="Sunny" class="weather-icon-main">
            <p class="temp-big" data-celsius="29">29 °C</p>
            <p class="weather-desc">Sunny</p>
        </section>

        <!-- RIGHT PANEL -->
        <section id="weather-details">
            <!-- Stats -->
            <div class="stats-container">
                <dl class="stat-row">
                    <dt>Precipitation</dt>
                    <dd>0%</dd>
                </dl>
                <dl class="stat-row">
                    <dt>Humidity</dt>
                    <dd>42%</dd>
                </dl>
                <dl class="stat-row">
                    <dt>Wind</dt>
                    <dd>3 km/h</dd>
                </dl>

                <div class="unit-toggle">
                    <span class="label-temp">TEMPERATURE</span>
                    <div class="toggle-controls">
                        <button id="btn-celsius" class="active" aria-label="Celsius">°C</button>
                        <span class="slash">/</span>
                        <button id="btn-fahrenheit" aria-label="Fahrenheit">°F</button>
                    </div>
                </div>
            </div>

            <!-- Forecast -->
            <div class="forecast-outer-bg">
                <section id="forecast" class="forecast-row">
                    <div class="day-card active">
                        <img src="images/sun-black.svg" alt="Sunny" class="forecast-icon">
                        <p class="day-label">Tue</p>
                        <p class="forecast-temp" data-celsius="30">30 °C</p>
                    </div>
                    <div class="day-card">
                        <img src="images/cloud-sun.svg" alt="Partly Cloudy" class="forecast-icon">
                        <p class="day-label">Wed</p>
                        <p class="forecast-temp" data-celsius="22">22 °C</p>
                    </div>
                    <div class="day-card">
                        <img src="images/cloud-rain.svg" alt="Rainy" class="forecast-icon">
                        <p class="day-label">Thu</p>
                        <p class="forecast-temp" data-celsius="6">06 °C</p>
                    </div>
                    <div class="day-card">
                        <img src="images/sun-white.svg" alt="Sunny" class="forecast-icon">
                        <p class="day-label">Fri</p>
                        <p class="forecast-temp" data-celsius="26">26 °C</p>
                    </div>
                </section>
            </div>

            <!-- Add Location Button -->
            <footer>
                <button class="btn-location" onclick="openModal()">
                    <div class="location-group">
                        <img src="images/location.svg" alt="" class="icon-nyc">
                        New York City
                    </div>
                    <img src="images/plus.svg" alt="Add" class="plus-icon">
                </button>
            </footer>
        </section>

        <!-- MODAL OVERLAY -->
        <aside id="location-modal">
            <div class="modal-content">
                <button class="close-btn" aria-label="Close" onclick="closeModal()">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="2" y1="2" x2="18" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="18" y1="2" x2="2" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </button>

                <h2>Add a new location</h2>

                <div class="search-box">
                    <input type="text" placeholder="Enter city or zip code">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="8.5" cy="8.5" r="6" stroke="white" stroke-width="2"/>
                        <line x1="13" y1="13" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>

                <div class="modal-divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">or</span>
                    <span class="divider-line"></span>
                </div>

                <button type="button" class="btn-current">
                    Use current location
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 10L17 3L10 17L8.5 11.5L3 10Z" fill="white"/>
                    </svg>
                </button>
            </div>
        </aside>

    <script>
        /* ===== Modal ===== */
        function openModal() {
            document.getElementById('location-modal').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('location-modal').classList.remove('visible');
        }

        document.getElementById('location-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        /* ===== Temperature Toggle ===== */
        var btnCelsius = document.getElementById('btn-celsius');
        var btnFahrenheit = document.getElementById('btn-fahrenheit');

        function celsiusToFahrenheit(c) {
            return Math.round((c * 9 / 5) + 32);
        }

        function updateTemperatures(unit) {
            /* Get all elements that have a data-celsius attribute */
            var tempElements = document.querySelectorAll('[data-celsius]');

            tempElements.forEach(function(el) {
                var celsius = parseInt(el.getAttribute('data-celsius'));

                if (unit === 'F') {
                    var fahrenheit = celsiusToFahrenheit(celsius);
                    el.textContent = fahrenheit + ' °F';
                } else {
                    /* Pad single digits with leading zero for forecast cards */
                    var display = celsius < 10 && celsius >= 0 ? '0' + celsius : celsius;
                    el.textContent = display + ' °C';
                }
            });
        }

        btnFahrenheit.addEventListener('click', function() {
            btnFahrenheit.classList.add('active');
            btnCelsius.classList.remove('active');
            updateTemperatures('F');
        });

        btnCelsius.addEventListener('click', function() {
            btnCelsius.classList.add('active');
            btnFahrenheit.classList.remove('active');
            updateTemperatures('C');
        });
    </script>
    </main>

</body>
</html>
