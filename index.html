<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Mary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

    <main>
        <section id="current-weather" class="current-weather">
            <h1>Monday</h1>
            <time datetime="2022-06-20">20 Jun 2022</time>
            <div class="location-biarritz-row">
                <img src="images/location.svg" alt="Location Icon" class="icon-biarritz"> 
                <span>Biarritz, FR</span>
            </div>
            
            <img src="images/sun-white.svg" alt="Sunny" class="weather-icon-main">
            <p class="temp-big">29 °C</p>
            <p class="weather-desc">Sunny</p>
        </section>

        <section id="weather-details">
            <div class="stats-container">
                <dl>
                    <dt>PRECIPITATION</dt>
                    <dd>0%</dd>
                    <dt>HUMIDITY</dt>
                    <dd>42%</dd>
                    <dt>WIND</dt>
                    <dd>3 km/h</dd>
                </dl>

                <div class="unit-toggle">
                    <span class="label-temp">TEMPERATURE</span>
                    <div class="toggle-controls">
                        <button aria-label="Celsius" class="active">°C</button> 
                        <span class="slash">/</span> 
                        <button aria-label="Fahrenheit">°F</button>
                    </div>
                </div>
            </div>

            <div class="forecast-outer-bg">
                <section id="forecast" class="forecast-row">
                    <div class="day-card active">
                        <img src="images/sun-black.svg" alt="Tue" class="forecast-icon">
                        <p class="day-label">Tue</p>
                        <p class="forecast-temp">30 °C</p>
                    </div>
                    <div class="day-card">
                        <img src="images/cloud-sun.svg" alt="Wed" class="forecast-icon">
                        <p class="day-label">Wed</p>
                        <p class="forecast-temp">22 °C</p>
                    </div>
                    <div class="day-card">
                        <img src="images/cloud-rain.svg" alt="Thu" class="forecast-icon">
                        <p class="day-label">Thu</p>
                        <p class="forecast-temp">06 °C</p>
                    </div>
                    <div class="day-card">
                        <img src="images/sun-white.svg" alt="Fri" class="forecast-icon">
                        <p class="day-label">Fri</p>
                        <p class="forecast-temp">26 °C</p>
                    </div>
                </section>
            </div>

            <footer>
                <button class="btn-location">
                    <div class="location-group">
                        <img src="images/location.svg" alt="" class="icon-nyc"> 
                        New York City
                    </div>
                    <img src="images/plus.svg" alt="Add" class="plus-icon">
                </button>
            </footer>
        </section>

        <aside id="location-modal">
            <div class="modal-content">
                <button class="close-btn" aria-label="Close">✕</button>
                <h2>Add a new location</h2>
                <form>
                    <div class="search-box">
                        <input type="text" placeholder="Enter city or zip code">
                        <span>🔍</span>
                    </div>
                    <p>or</p>
                    <button type="button" class="btn-current">Use current location <span>➤</span></button>
                </form>
            </div>
        </aside>
    </main>

</body>
</html>
